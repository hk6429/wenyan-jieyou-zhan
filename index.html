<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>文言解憂站</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/main.css?v=20260724-p0" />
<link rel="stylesheet" href="css/caotang.css" />
<link rel="stylesheet" href="css/fusion.css" />
<link rel="stylesheet" href="css/rtbattle.css?v=20260724-p0" />
<link rel="stylesheet" href="css/market.css" />
</head>
<body>
<header class="hero">
  <div class="header-row">
    <div class="hero-title">
      <h1>文言解憂站</h1>
      <p class="hero-tag">讀一篇古文，解一分憂</p>
      <p class="hero-sub">國中·高中文言文閱讀理解練功站</p>
    </div>
    <div class="header-tools">
      <button id="teacher-launch" class="teacher-launch" type="button" aria-label="教師開課，進入文戰擂台主持全班文會">教師開課・文戰擂台</button>
      <button id="guide-reopen" class="guide-reopen" title="怎麼玩" aria-label="怎麼玩，重看新手教學">?</button>
      <div id="ink-hud" class="ink-hud" title="墨錠：答對可得，用於合契與市集，每日賺取有上限">墨錠 <span id="ink-count">0</span><span id="ink-today" class="ink-today"></span></div>
    </div>
  </div>
</header>

<nav class="tabs" aria-label="核心學習">
  <button data-tab="list" class="active">選文</button>
  <button data-tab="flashcard">閃卡</button>
  <button data-tab="quiz">自測</button>
  <button data-tab="battle">對戰</button>
  <button data-tab="wenhao">文豪錄</button>
</nav>
<nav class="tabs tabs-sub" aria-label="進階江湖">
  <span class="tabs-sub-label" aria-hidden="true">江湖</span>
  <button data-tab="caotang">草堂</button>
  <button data-tab="rt">擂台</button>
  <button data-tab="fusion">合契</button>
  <button data-tab="market">市集</button>
</nav>

<main id="app"></main>
<div id="live-region" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<footer class="site-footer">
  <div>
    <span>本站累計訪客：</span>
    <img class="visitor-badge" src="https://visitor-badge.laobi.icu/badge?page_id=hk6429.wenyan-jieyou-zhan" alt="文言解憂站累計訪客數" loading="lazy" referrerpolicy="no-referrer" />
  </div>
  <button id="report-open" class="report-open" type="button">問題回報</button>
</footer>

<dialog id="report-dialog" class="report-dialog" aria-labelledby="report-title">
  <form id="report-form">
    <div class="report-heading">
      <div>
        <h2 id="report-title">問題回報</h2>
        <p>發現錯字、內容疑問或功能異常，都歡迎告訴我們。</p>
      </div>
      <button id="report-close" class="report-close" type="button" aria-label="關閉問題回報">×</button>
    </div>
    <label for="report-category">問題類型</label>
    <select id="report-category" name="category">
      <option value="內容錯誤">內容錯誤</option>
      <option value="功能異常">功能異常</option>
      <option value="操作建議">操作建議</option>
      <option value="其他">其他</option>
    </select>
    <label for="report-message">問題說明</label>
    <textarea id="report-message" name="message" minlength="10" maxlength="2000" rows="6" required placeholder="請告訴我們在哪個畫面、做了什麼，以及發生什麼情況。"></textarea>
    <label for="report-contact">聯絡方式 <span>（選填）</span></label>
    <input id="report-contact" name="contact" maxlength="120" autocomplete="email" placeholder="電子郵件或其他方便聯絡的方式" />
    <div class="report-hp" aria-hidden="true">
      <label for="report-website">網站</label>
      <input id="report-website" name="website" tabindex="-1" autocomplete="off" />
    </div>
    <p id="report-status" class="report-status" role="status" aria-live="polite"></p>
    <div class="report-actions">
      <button class="primary" id="report-submit" type="submit">送出回報</button>
    </div>
  </form>
</dialog>

<script src="js/store.js?v=20260724-p0"></script>
<script src="js/renown-store.js?v=20260724-p0"></script>
<script src="js/wyapi.js"></script>
<script src="js/report.js?v=20260724"></script>
<script src="js/flashcard.js"></script>
<script src="js/quiz.js?v=20260724-core"></script>
<script src="js/battle.js"></script>
<script src="js/wenhao.js"></script>
<script src="js/caotang-store.js?v=20260724-p0"></script>
<script src="js/caotang-ui.js"></script>
<script src="js/fusion-store.js?v=20260724-p0"></script>
<script src="js/fusion-adapter.js"></script>
<script src="js/fusion-ui.js?v=20260724-p0"></script>
<script src="js/rtbattle-logic.js"></script>
<script src="js/rt-events.js"></script>
<script src="js/rt-season.js"></script>
<script src="js/livewall.js?v=20260724-core"></script>
<script src="js/rt-ui.js?v=20260724-p0"></script>
<script src="js/market-store.js"></script>
<script src="js/market-adapter.js"></script>
<script src="js/market-ui.js"></script>
<script src="js/app.js?v=20260724-p0"></script>
<script src="js/analytics.js"></script>
<script data-goatcounter="https://hk6429.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</body>
</html>
